name: Update Dashboard Daily

on:
  schedule:
    # Runs at 6:00 AM Pacific Time (14:00 UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated data files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install garminconnect

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python scripts/fetch_garmin.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Dashboard Bot"
          git add data/
          git diff --staged --quiet || git commit -m "🏊 Auto-update: $(date '+%Y-%m-%d %H:%M') UTC"
          git push
